name: Build Gaming OS 2026
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Profile
        run: |
          # 1. Force move files to where the builder expects them
          find . -name "packages.x86_64" -exec cp {} ./packages.x86_64 \;
          find . -name "gaming-optimizations.sh" -exec cp {} ./gaming-optimizations.sh \;
          
          # 2. Setup the internal ISO folders
          mkdir -p archiso_config/airootfs/root/
          mkdir -p archiso_config/airootfs/etc/systemd/system/multi-user.target.wants/
          
          # 3. Create the startup service
          cat <<EOF > archiso_config/airootfs/etc/systemd/system/optimize.service
          [Unit]
          Description=Gaming Tweaks
          After=network.target
          [Service]
          Type=oneshot
          ExecStart=/usr/bin/bash /root/gaming-optimizations.sh
          [Install]
          WantedBy=multi-user.target
          EOF
          
          ln -sf /etc/systemd/system/optimize.service archiso_config/airootfs/etc/systemd/system/multi-user.target.wants/optimize.service

      - name: Build with Docker
        run: |
          docker run --privileged -v ${{ github.workspace }}:/work archlinux:latest bash -c "
            pacman -Syu --noconfirm archiso && 
            cp -r /usr/share/archiso/configs/releng/* /work/archiso_config/ &&
            cp /work/packages.x86_64 /work/archiso_config/packages.x86_64 &&
            cp /work/gaming-optimizations.sh /work/archiso_config/airootfs/root/gaming-optimizations.sh &&
            chmod +x /work/archiso_config/airootfs/root/gaming-optimizations.sh &&
            cd /work && mkarchiso -v -w /work/work_dir -o /work/out /work/archiso_config
          "

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GamingOS-2026
          path: out/*.iso
